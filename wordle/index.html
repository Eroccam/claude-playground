<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safran Wordle</title>
  <link rel="stylesheet" href="/wordle/styles.css">
</head>
<body>
  <main class="screen screen-identity hidden" data-screen="identity">
    <section class="identity-card">
      <h1>Safran Wordle</h1>
      <form id="nameForm" class="name-form">
        <input id="playerName" autocomplete="name" maxlength="60" required placeholder="Enter your name">
      </form>
    </section>
  </main>

  <main class="screen screen-game hidden" data-screen="game">
    <section class="game-shell">
      <h1>Safran Wordle</h1>
      <div id="grid" class="grid" aria-label="Wordle board"></div>
      <div id="message" class="message"></div>
      <div id="keyboard" class="keyboard"></div>
    </section>
  </main>

  <main class="screen screen-results hidden" data-screen="results">
    <section class="results-shell">
      <header class="results-header">
        <h1>Safran Wordle</h1>
        <div>
          <div class="result-label">Correct Word</div>
          <div id="resultWord" class="word"></div>
        </div>
      </header>

      <section class="result-card">
        <p id="definition" class="definition"></p>
        <a id="safranLink" class="link" target="_blank" rel="noopener noreferrer">Safran context</a>
        <div class="result-stats">
          <span>Completion time</span>
          <strong id="completionTime"></strong>
        </div>
        <div class="share-header">
          <h2>Your Grid</h2>
          <button id="copyShare" type="button">Share / Copy</button>
        </div>
        <div id="shareGrid" class="share-grid"></div>
      </section>

      <section class="leaderboard-panel">
        <h2>Leaderboards</h2>
        <div class="boards">
          <div>
            <h3>Fastest Solve</h3>
            <ol id="fastest"></ol>
          </div>
          <div>
            <h3>Fewest Guesses</h3>
            <ol id="fewest"></ol>
          </div>
          <div>
            <h3>Current Streaks</h3>
            <ol id="streaks"></ol>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="/wordle/config.js"></script>
  <script src="/wordle/wordle-data.js"></script>
  <script src="/wordle/app.js"></script>
</body>
</html>
