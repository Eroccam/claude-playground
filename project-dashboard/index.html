<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safran Events Platform — Project Dashboard</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-2:   #1c2128;
      --border:      #30363d;
      --border-muted:#21262d;
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --text-subtle: #484f58;

      --green:       #238636;
      --green-light: #2ea043;
      --green-text:  #56d364;
      --amber:       #9e6a03;
      --amber-light: #bb8009;
      --amber-text:  #e3b341;
      --gray:        #30363d;
      --gray-text:   #8b949e;
      --red:         #da3633;
      --red-light:   #f85149;
      --red-text:    #ff7b72;
      --blue:        #1f6feb;
      --blue-text:   #58a6ff;

      --safran-blue: #003189;
      --safran-orange: #e8640c;

      --radius:      8px;
      --radius-sm:   4px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── Layout ───────────────────────────────────────────────────── */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ───────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--safran-blue);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .logo-divider {
      color: var(--border);
      font-size: 20px;
      margin: 0 4px;
    }

    .logo-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-text);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    .refresh-dot.stale { background: var(--amber-text); animation: none; }
    .refresh-dot.error { background: var(--red-text); animation: none; }

    /* ─── Main ─────────────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 28px 24px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── Top bar ──────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── Filters ──────────────────────────────────────────────────── */
    .filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .filter-btn:hover {
      border-color: var(--blue);
      color: var(--blue-text);
      background: rgba(31, 111, 235, 0.08);
    }

    .filter-btn.active {
      background: rgba(31, 111, 235, 0.12);
      border-color: var(--blue);
      color: var(--blue-text);
    }

    .filter-btn .count {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 0 6px;
      font-size: 11px;
      color: var(--text-subtle);
    }

    .filter-btn.active .count {
      background: rgba(31, 111, 235, 0.2);
      color: var(--blue-text);
    }

    /* ─── Stats bar ────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius);
      padding: 14px 20px;
      min-width: 130px;
      flex: 1;
    }

    .stat-card .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-card .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .stat-card.s-active  .stat-value { color: var(--green-text); }
    .stat-card.s-progress .stat-value { color: var(--amber-text); }
    .stat-card.s-planned  .stat-value { color: var(--gray-text); }
    .stat-card.s-blocked  .stat-value { color: var(--red-text); }

    /* ─── Grid ─────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ─── Project Card ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: fadeIn 0.25s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .card.status-active   { border-left: 3px solid var(--green-light); }
    .card.status-in-progress { border-left: 3px solid var(--amber-light); }
    .card.status-planned  { border-left: 3px solid var(--text-subtle); }
    .card.status-blocked  { border-left: 3px solid var(--red-light); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title-group { flex: 1; }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-phase {
      font-size: 11px;
      color: var(--text-subtle);
      margin-top: 3px;
      font-family: var(--font-mono);
    }

    /* ─── Status Badge ─────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-active     { background: rgba(35, 134, 54, 0.15);  color: var(--green-text);  border: 1px solid rgba(46, 160, 67, 0.3);  }
    .badge-active::before     { background: var(--green-text); }
    .badge-in-progress{ background: rgba(158, 106, 3, 0.15);  color: var(--amber-text);  border: 1px solid rgba(187, 128, 9, 0.3);  }
    .badge-in-progress::before{ background: var(--amber-text); animation: pulse 1.5s ease infinite; }
    .badge-planned    { background: rgba(48, 54, 61, 0.4);     color: var(--gray-text);   border: 1px solid rgba(139, 148, 158, 0.2); }
    .badge-planned::before    { background: var(--gray-text); }
    .badge-blocked    { background: rgba(218, 54, 51, 0.1);   color: var(--red-text);    border: 1px solid rgba(248, 81, 73, 0.3);   }
    .badge-blocked::before    { background: var(--red-text); }

    /* ─── Card body ────────────────────────────────────────────────── */
    .card-description {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      flex: 1;
    }

    /* ─── Stack pills ──────────────────────────────────────────────── */
    .stack-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .pill {
      padding: 2px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-sm);
      font-size: 11px;
      color: var(--text-subtle);
      font-family: var(--font-mono);
    }

    /* ─── Card footer ──────────────────────────────────────────────── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border-muted);
      gap: 8px;
    }

    .card-path {
      font-size: 11px;
      color: var(--text-subtle);
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .card-meta {
      font-size: 11px;
      color: var(--text-subtle);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--font);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .open-btn:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ─── Empty state ──────────────────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 13px; margin-top: 4px; }

    /* ─── Error/Loading banner ─────────────────────────────────────── */
    .banner {
      padding: 14px 18px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.5;
    }

    .banner.error {
      background: rgba(218, 54, 51, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--red-text);
    }

    .banner.info {
      background: rgba(31, 111, 235, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.2);
      color: var(--blue-text);
    }

    .banner-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .banner code {
      font-family: var(--font-mono);
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
    }

    /* ─── Last updated ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px 24px;
      font-size: 12px;
      color: var(--text-subtle);
      border-top: 1px solid var(--border-muted);
    }

    /* ─── Loading skeleton ─────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border-muted) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sk-title { height: 16px; width: 60%; }
    .sk-badge { height: 20px; width: 80px; border-radius: 12px; }
    .sk-text  { height: 12px; width: 100%; }
    .sk-text2 { height: 12px; width: 75%; }
    .sk-pills { display: flex; gap: 6px; }
    .sk-pill  { height: 20px; width: 60px; border-radius: 4px; }

    /* ─── Phase badge (clickable) ──────────────────────────────────── */
    .card-phase {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-subtle);
      margin-top: 3px;
      font-family: var(--font-mono);
      cursor: pointer;
      border-radius: 3px;
      padding: 1px 4px;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }

    .card-phase:hover {
      background: var(--surface-2);
      color: var(--text-muted);
    }

    .card-phase .phase-chevron {
      font-style: normal;
      font-size: 9px;
      opacity: 0.6;
      transition: transform 0.15s;
    }

    .card-phase .phase-progress {
      font-size: 10px;
      color: var(--text-subtle);
      opacity: 0.8;
    }

    /* ─── Phase popover ─────────────────────────────────────────────── */
    .phase-popover {
      position: fixed;
      z-index: 999;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 14px 16px;
      min-width: 260px;
      max-width: 320px;
      animation: popIn 0.12s ease both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(-4px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);     }
    }

    .popover-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .popover-progress {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .popover-bar-track {
      height: 3px;
      background: var(--border-muted);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .popover-bar-fill {
      height: 100%;
      background: var(--green-text);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .popover-bar-fill.pct-0   { background: var(--text-subtle); }
    .popover-bar-fill.partial { background: var(--amber-text); }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    .checklist-item .ci-icon {
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 13px;
    }

    .checklist-item.done .ci-text  { color: var(--text-muted); }
    .checklist-item.todo .ci-text  { color: var(--text-subtle); }
    .checklist-item.done .ci-icon  { color: var(--green-text); }
    .checklist-item.todo .ci-icon  { color: var(--text-subtle); }

    /* ─── Drag & Drop ──────────────────────────────────────────────── */
    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      margin-right: 6px;
      flex-shrink: 0;
      color: var(--text-subtle);
      cursor: grab;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      border-radius: 3px;
    }

    .card:hover .drag-handle { opacity: 1; }
    .drag-handle:hover { color: var(--text-muted); background: var(--surface-2); }
    .drag-handle:active { cursor: grabbing; }

    .card[draggable="true"] { cursor: default; }

    .card.dragging {
      opacity: 0.35;
      cursor: grabbing;
    }

    /* Drop-before / drop-after: bright line on the relevant side */
    .card.drop-before { box-shadow: -4px 0 0 0 var(--blue), 0 4px 16px rgba(0,0,0,0.3); }
    .card.drop-after  { box-shadow:  4px 0 0 0 var(--blue), 0 4px 16px rgba(0,0,0,0.3); }

    /* Reset button */
    .reset-order-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-subtle);
      font-size: 11px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      display: none; /* shown only when custom order is active */
    }
    .reset-order-btn.visible { display: inline-flex; align-items: center; gap: 4px; }
    .reset-order-btn:hover { border-color: var(--border); color: var(--text-muted); background: var(--surface-2); }

    /* ─── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      main { padding: 20px 16px; }
      .logo-sub { display: none; }
      .stats-bar { gap: 10px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ─── Header ──────────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">S</div>
        <span class="logo-text">Safran</span>
        <span class="logo-divider">/</span>
        <span class="logo-sub">Events Platform</span>
      </div>
    </div>
    <div class="header-right">
      <div class="refresh-indicator">
        <div class="refresh-dot" id="refreshDot"></div>
        <span id="refreshLabel">Live</span>
      </div>
    </div>
  </header>

  <!-- ─── Main ────────────────────────────────────────────────────── -->
  <main>

    <div id="errorBanner" style="display:none"></div>

    <!-- Top bar -->
    <div class="topbar">
      <div>
        <div class="page-title">Project Dashboard</div>
        <div class="page-subtitle" id="pageSubtitle">Loading projects…</div>
      </div>
      <div class="filters">
        <span class="filter-label">Filter:</span>
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
          All <span class="count" id="count-all">—</span>
        </button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active')">
          Active <span class="count" id="count-active">—</span>
        </button>
        <button class="filter-btn" data-filter="in-progress" onclick="setFilter('in-progress')">
          In Progress <span class="count" id="count-in-progress">—</span>
        </button>
        <button class="filter-btn" data-filter="planned" onclick="setFilter('planned')">
          Planned <span class="count" id="count-planned">—</span>
        </button>
        <button class="filter-btn" data-filter="blocked" onclick="setFilter('blocked')">
          Blocked <span class="count" id="count-blocked">—</span>
        </button>
        <button class="reset-order-btn" id="resetOrderBtn" onclick="resetOrder()" title="Restore default phase order">
          ↺ Reset order
        </button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card s-active">
        <div class="stat-value" id="stat-active">—</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card s-progress">
        <div class="stat-value" id="stat-in-progress">—</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card s-planned">
        <div class="stat-value" id="stat-planned">—</div>
        <div class="stat-label">Planned</div>
      </div>
      <div class="stat-card s-blocked">
        <div class="stat-value" id="stat-blocked">—</div>
        <div class="stat-label">Blocked</div>
      </div>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid">
      <!-- Skeleton cards shown while loading -->
      <div class="skeleton-card">
        <div style="display:flex;justify-content:space-between">
          <div class="skeleton sk-title"></div>
          <div class="skeleton sk-badge"></div>
        </div>
        <div class="skeleton sk-text"></div>
        <div class="skeleton sk-text2"></div>
        <div class="sk-pills"><div class="skeleton sk-pill"></div><div class="skeleton sk-pill"></div></div>
      </div>
      <div class="skeleton-card">
        <div style="display:flex;justify-content:space-between">
          <div class="skeleton sk-title"></div>
          <div class="skeleton sk-badge"></div>
        </div>
        <div class="skeleton sk-text"></div>
        <div class="skeleton sk-text2"></div>
        <div class="sk-pills"><div class="skeleton sk-pill"></div><div class="skeleton sk-pill"></div></div>
      </div>
      <div class="skeleton-card">
        <div style="display:flex;justify-content:space-between">
          <div class="skeleton sk-title"></div>
          <div class="skeleton sk-badge"></div>
        </div>
        <div class="skeleton sk-text"></div>
        <div class="skeleton sk-text2"></div>
        <div class="sk-pills"><div class="skeleton sk-pill"></div><div class="skeleton sk-pill"></div></div>
      </div>
    </div>

  </main>

  <footer id="footerBar">
    Safran Events Platform &mdash; Project Dashboard &mdash; v1.0
  </footer>
</div>

<script>
  // ─── State ──────────────────────────────────────────────────────────
  let allProjects = [];
  let currentFilter = 'all';
  let refreshCountdown = 60;
  let refreshTimer = null;
  let countdownTimer = null;
  let lastUpdated = null;

  const ORDER_KEY = 'safran_card_order';
  let dragSrcId = null; // project ID of the card being dragged

  // ─── Status helpers ──────────────────────────────────────────────────
  const STATUS_META = {
    'active':      { label: 'Active',       badgeClass: 'badge-active',      cssClass: 'status-active'      },
    'in-progress': { label: 'In Progress',  badgeClass: 'badge-in-progress', cssClass: 'status-in-progress' },
    'planned':     { label: 'Planned',      badgeClass: 'badge-planned',     cssClass: 'status-planned'     },
    'blocked':     { label: 'Blocked',      badgeClass: 'badge-blocked',     cssClass: 'status-blocked'     },
  };

  function normStatus(s) {
    if (!s) return 'planned';
    const map = { 'in_progress': 'in-progress', 'inprogress': 'in-progress' };
    return map[s.toLowerCase()] || s.toLowerCase();
  }

  function formatRelativeDate(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffH = Math.floor(diffMin / 60);
    const diffD = Math.floor(diffH / 24);
    if (diffD > 30) return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    if (diffD >= 1)  return `${diffD}d ago`;
    if (diffH >= 1)  return `${diffH}h ago`;
    if (diffMin >= 1) return `${diffMin}m ago`;
    return 'just now';
  }

  function shortPath(fullPath) {
    if (!fullPath) return '';
    // Show only the last 2 segments for readability
    const parts = fullPath.replace(/\\/g, '/').split('/');
    return '…/' + parts.slice(-2).join('/');
  }

  // ─── Render ──────────────────────────────────────────────────────────
  function renderCards(projects) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (projects.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">No projects match this filter</div>
          <div class="empty-sub">Try selecting a different status filter above.</div>
        </div>`;
      return;
    }

    projects.forEach((proj, i) => {
      const status = normStatus(proj.status);
      const meta = STATUS_META[status] || STATUS_META['planned'];
      const card = document.createElement('div');
      card.className = `card ${meta.cssClass}`;
      card.style.animationDelay = `${i * 40}ms`;
      card.draggable = true;
      card.dataset.projectId = proj.id;

      const stackPills = (proj.stack || [])
        .map(s => `<span class="pill">${escHtml(s)}</span>`)
        .join('');

      // Build launch URL: prefer entryFile (e.g. index.html), fall back to folder
      const basePath = proj.folderPath ? proj.folderPath.replace(/\\/g, '/') : '';
      const launchUrl = basePath
        ? proj.entryFile
          ? `file:///${basePath}/${proj.entryFile}`
          : `file:///${basePath}`
        : '#';
      const launchLabel = proj.entryFile ? 'Launch' : 'Open folder';
      const launchTitle = proj.entryFile
        ? `Open ${proj.entryFile} in browser`
        : 'Open project folder';

      const phaseLabel = proj.phase != null ? `Phase ${proj.phase}` : '';
      const checklist  = proj.checklist || [];
      const doneCount  = checklist.filter(c => c.done).length;

      card.innerHTML = `
        <div class="card-header">
          <div class="drag-handle" title="Drag to reorder">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor">
              <circle cx="2.5" cy="2.5" r="1.5"/><circle cx="7.5" cy="2.5" r="1.5"/>
              <circle cx="2.5" cy="8"   r="1.5"/><circle cx="7.5" cy="8"   r="1.5"/>
              <circle cx="2.5" cy="13.5" r="1.5"/><circle cx="7.5" cy="13.5" r="1.5"/>
            </svg>
          </div>
          <div class="card-title-group">
            <div class="card-title">${escHtml(proj.name)}</div>
            ${phaseLabel ? `
            <div class="card-phase" data-project-id="${escHtml(proj.id)}" title="Click to see phase checklist">
              ${escHtml(phaseLabel)}
              ${checklist.length ? `<span class="phase-progress">${doneCount}/${checklist.length}</span>` : ''}
              <i class="phase-chevron">▾</i>
            </div>` : ''}
          </div>
          <span class="badge ${meta.badgeClass}">${meta.label}</span>
        </div>
        <div class="card-description">${escHtml(proj.description || '')}</div>
        ${stackPills ? `<div class="stack-pills">${stackPills}</div>` : ''}
        <div class="card-footer">
          <span class="card-path" title="${escHtml(proj.folderPath || '')}">${escHtml(shortPath(proj.folderPath || ''))}</span>
          <span class="card-meta">${formatRelativeDate(proj.lastUpdated)}</span>
          <a class="open-btn" href="${launchUrl}" title="${launchTitle}">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
              <path d="M1.5 1h5.25a.75.75 0 0 1 0 1.5H2.5v11h11v-4.25a.75.75 0 0 1 1.5 0V14a1 1 0 0 1-1 1h-12a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1Zm10.25 0h2.5a.75.75 0 0 1 .75.75v2.5a.75.75 0 0 1-1.5 0V3.06l-5.22 5.22a.75.75 0 1 1-1.06-1.06L12.44 2h-0.69a.75.75 0 0 1 0-1.5Z"/>
            </svg>
            ${launchLabel}
          </a>
        </div>
      `;

      // ── Drag events ──
      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragover',  onDragOver);
      card.addEventListener('dragleave', onDragLeave);
      card.addEventListener('drop',      onDrop);
      card.addEventListener('dragend',   onDragEnd);

      grid.appendChild(card);
    });
  }

  function renderStats(projects) {
    const counts = { 'active': 0, 'in-progress': 0, 'planned': 0, 'blocked': 0 };
    projects.forEach(p => {
      const s = normStatus(p.status);
      if (counts[s] !== undefined) counts[s]++;
    });

    document.getElementById('stat-active').textContent = counts['active'];
    document.getElementById('stat-in-progress').textContent = counts['in-progress'];
    document.getElementById('stat-planned').textContent = counts['planned'];
    document.getElementById('stat-blocked').textContent = counts['blocked'];

    document.getElementById('count-all').textContent = projects.length;
    document.getElementById('count-active').textContent = counts['active'];
    document.getElementById('count-in-progress').textContent = counts['in-progress'];
    document.getElementById('count-planned').textContent = counts['planned'];
    document.getElementById('count-blocked').textContent = counts['blocked'];
  }

  function applyFilter() {
    const filtered = currentFilter === 'all'
      ? allProjects
      : allProjects.filter(p => normStatus(p.status) === currentFilter);
    renderCards(filtered);
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    applyFilter();
  }

  // ─── Order persistence ───────────────────────────────────────────────
  function saveOrder() {
    const ids = allProjects.map(p => p.id);
    localStorage.setItem(ORDER_KEY, JSON.stringify(ids));
    document.getElementById('resetOrderBtn').classList.add('visible');
  }

  function restoreOrder() {
    try {
      const saved = localStorage.getItem(ORDER_KEY);
      if (!saved) return;
      const ids = JSON.parse(saved);
      const idMap = Object.fromEntries(allProjects.map(p => [p.id, p]));
      // Build ordered list from saved IDs, appending any new projects at the end
      const ordered = ids.map(id => idMap[id]).filter(Boolean);
      const newOnes = allProjects.filter(p => !ids.includes(p.id));
      allProjects = [...ordered, ...newOnes];
      document.getElementById('resetOrderBtn').classList.add('visible');
    } catch (e) { /* ignore corrupt storage */ }
  }

  function resetOrder() {
    localStorage.removeItem(ORDER_KEY);
    allProjects.sort((a, b) => (a.phase || 99) - (b.phase || 99));
    document.getElementById('resetOrderBtn').classList.remove('visible');
    applyFilter();
  }

  // ─── Drag & Drop ─────────────────────────────────────────────────────
  function onDragStart(e) {
    dragSrcId = this.dataset.projectId;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcId);
  }

  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (this.dataset.projectId === dragSrcId) return;
    // Determine if cursor is in left or right half to show insert-before/after
    const rect = this.getBoundingClientRect();
    const midX = rect.left + rect.width / 2;
    clearDropIndicators();
    if (e.clientX < midX) {
      this.classList.add('drop-before');
    } else {
      this.classList.add('drop-after');
    }
  }

  function onDragLeave() {
    this.classList.remove('drop-before', 'drop-after');
  }

  function onDrop(e) {
    e.preventDefault();
    const targetId = this.dataset.projectId;
    if (!dragSrcId || dragSrcId === targetId) return;

    const insertBefore = this.classList.contains('drop-before');
    clearDropIndicators();

    // Reorder allProjects
    const srcIdx = allProjects.findIndex(p => p.id === dragSrcId);
    const tgtIdx = allProjects.findIndex(p => p.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;

    const [moved] = allProjects.splice(srcIdx, 1);
    const newTgt = allProjects.findIndex(p => p.id === targetId);
    const insertAt = insertBefore ? newTgt : newTgt + 1;
    allProjects.splice(insertAt, 0, moved);

    saveOrder();
    applyFilter();
  }

  function onDragEnd() {
    clearDropIndicators();
    document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
    dragSrcId = null;
  }

  function clearDropIndicators() {
    document.querySelectorAll('.card.drop-before, .card.drop-after')
      .forEach(c => c.classList.remove('drop-before', 'drop-after'));
  }

  // ─── Phase popover ───────────────────────────────────────────────────
  let activePopover = null;
  let activePhaseEl = null;

  // Delegate clicks on .card-phase elements
  document.getElementById('grid').addEventListener('click', e => {
    const badge = e.target.closest('.card-phase');
    if (!badge) return;
    e.stopPropagation();

    // Toggle: if this badge already has an open popover, close it
    if (activePhaseEl === badge) {
      closePopover();
      return;
    }
    openPopover(badge);
  });

  document.addEventListener('click', e => {
    if (activePopover && !activePopover.contains(e.target)) closePopover();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePopover();
  });

  function openPopover(badgeEl) {
    closePopover();

    const projectId = badgeEl.dataset.projectId;
    const proj = allProjects.find(p => p.id === projectId);
    if (!proj) return;

    const checklist = proj.checklist || [];
    const doneCount = checklist.filter(c => c.done).length;
    const pct = checklist.length ? Math.round(doneCount / checklist.length * 100) : 0;
    const barClass = pct === 0 ? 'pct-0' : pct < 100 ? 'partial' : '';

    const items = checklist.map(item => `
      <div class="checklist-item ${item.done ? 'done' : 'todo'}">
        <span class="ci-icon">${item.done ? '✓' : '○'}</span>
        <span class="ci-text">${escHtml(item.text)}</span>
      </div>`).join('');

    const pop = document.createElement('div');
    pop.className = 'phase-popover';
    pop.innerHTML = `
      <div class="popover-title">
        <span>Phase ${escHtml(String(proj.phase))} — ${escHtml(proj.name)}</span>
        <span class="popover-progress">${doneCount}/${checklist.length} done</span>
      </div>
      <div class="popover-bar-track">
        <div class="popover-bar-fill ${barClass}" style="width:${pct}%"></div>
      </div>
      <div class="checklist">${items || '<div style="font-size:12px;color:var(--text-subtle)">No checklist defined.</div>'}</div>
    `;

    document.body.appendChild(pop);
    activePopover = pop;
    activePhaseEl = badgeEl;

    // Position below the badge, aligned left
    const rect = badgeEl.getBoundingClientRect();
    const popW = pop.offsetWidth;
    const popH = pop.offsetHeight;
    let left = rect.left;
    let top  = rect.bottom + 6;

    // Keep within viewport
    if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
    if (top + popH > window.innerHeight - 8) top = rect.top - popH - 6;

    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';

    badgeEl.querySelector('.phase-chevron').style.transform = 'rotate(180deg)';
  }

  function closePopover() {
    if (activePopover) {
      activePopover.remove();
      activePopover = null;
    }
    if (activePhaseEl) {
      const chev = activePhaseEl.querySelector('.phase-chevron');
      if (chev) chev.style.transform = '';
      activePhaseEl = null;
    }
  }

  // ─── Data loading ────────────────────────────────────────────────────
  // Uses a <script> tag injection to load projects-data.js, which works
  // over file:// without triggering CORS or Windows Firewall prompts.
  function loadProjects() {
    return new Promise((resolve) => {
      const dot = document.getElementById('refreshDot');
      const label = document.getElementById('refreshLabel');
      const errorBanner = document.getElementById('errorBanner');

      // Remove any previously injected data script so we get a fresh load
      const old = document.getElementById('__projectsDataScript');
      if (old) old.remove();
      // Also clear the global so we can detect a failed load
      window.SAFRAN_PROJECTS = undefined;

      const script = document.createElement('script');
      script.id = '__projectsDataScript';
      // Cache-bust so the browser re-reads the file on every refresh
      script.src = '../projects-data.js?_=' + Date.now();

      script.onload = () => {
        const data = window.SAFRAN_PROJECTS;
        if (!data || !data.projects) {
          showError('projects-data.js loaded but window.SAFRAN_PROJECTS is missing.');
          resolve();
          return;
        }

        allProjects = data.projects.slice().sort((a, b) => (a.phase || 99) - (b.phase || 99));
        lastUpdated = data.lastUpdated;
        restoreOrder();

        errorBanner.style.display = 'none';
        dot.className = 'refresh-dot';
        label.textContent = 'Live';

        renderStats(allProjects);
        applyFilter();

        document.getElementById('pageSubtitle').textContent =
          `${allProjects.length} project${allProjects.length !== 1 ? 's' : ''} · last synced ${formatRelativeDate(new Date().toISOString())}`;

        document.getElementById('footerBar').textContent =
          `Safran Events Platform · Project Dashboard · data updated ${formatRelativeDate(lastUpdated)}`;

        resolve();
      };

      script.onerror = () => {
        showError('Could not load <code>projects-data.js</code>. Make sure the file exists at <code>claude-playground/projects-data.js</code> and you are opening <code>project-dashboard/index.html</code> from inside the <code>claude-playground</code> folder.');
        resolve();
      };

      document.head.appendChild(script);
    });

    function showError(msg) {
      const dot = document.getElementById('refreshDot');
      const label = document.getElementById('refreshLabel');
      const errorBanner = document.getElementById('errorBanner');
      dot.className = 'refresh-dot error';
      label.textContent = 'Error';
      errorBanner.style.display = '';
      errorBanner.innerHTML = `<div class="banner error"><span class="banner-icon">⚠️</span><div>${msg}</div></div>`;
      if (allProjects.length === 0) document.getElementById('grid').innerHTML = '';
    }
  }

  // ─── Auto-refresh ────────────────────────────────────────────────────
  function startRefreshCycle() {
    refreshCountdown = 60;
    updateRefreshLabel();

    clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      refreshCountdown--;
      updateRefreshLabel();
      if (refreshCountdown <= 0) {
        refreshCountdown = 60;
        loadProjects();
      }
    }, 1000);
  }

  function updateRefreshLabel() {
    const label = document.getElementById('refreshLabel');
    const dot = document.getElementById('refreshDot');
    if (dot.classList.contains('error')) return;
    label.textContent = refreshCountdown < 60 ? `Refresh in ${refreshCountdown}s` : 'Live';
  }

  // ─── XSS-safe HTML escape ────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ─── Boot ────────────────────────────────────────────────────────────
  loadProjects().then(startRefreshCycle);
</script>
</body>
</html>
